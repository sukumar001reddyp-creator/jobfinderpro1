{% extends "layouts/base.html" %}

{% block title %}Create Job Alert{% endblock %}

{% block content %}

<section class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-5">

                    <h2 class="fw-bold mb-4">

                        Create Job Alert

                    </h2>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">

                                Keyword

                            </label>

                            <input
                                type="text"
                                name="keyword"
                                class="form-control"
                                placeholder="Python Developer"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Location

                            </label>

                            <input
                                type="text"
                                name="location"
                                class="form-control"
                                placeholder="Hyderabad">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Employment Type

                            </label>

                            <select
                                name="employment_type"
                                class="form-select">

                                <option value="">Select</option>

                                <option>Full-time</option>

                                <option>Part-time</option>

                                <option>Internship</option>

                                <option>Contract</option>

                            </select>

                        </div>

                        <div class="form-check mb-3">

                            <input
                                class="form-check-input"
                                type="checkbox"
                                name="remote"
                                id="remote">

                            <label
                                class="form-check-label"
                                for="remote">

                                Remote Jobs Only

                            </label>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Alert Frequency

                            </label>

                            <select
                                name="frequency"
                                class="form-select">

                                <option value="daily">

                                    Daily

                                </option>

                                <option value="weekly">

                                    Weekly

                                </option>

                            </select>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary btn-lg">

                            <i class="bi bi-bell-fill"></i>

                            Create Alert

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
