{% extends "layouts/base.html" %}

{% block title %}Create Resume | JobFinder Pro{% endblock %}

{% block content %}

<section class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-9">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-5">

                    <h2 class="fw-bold mb-4">

                        Create Resume

                    </h2>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">

                                Resume Title

                            </label>

                            <input
                                type="text"
                                name="title"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Full Name

                            </label>

                            <input
                                type="text"
                                name="full_name"
                                class="form-control"
                                required>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Email

                                </label>

                                <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Phone

                                </label>

                                <input
                                    type="text"
                                    name="phone"
                                    class="form-control">

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Professional Summary

                            </label>

                            <textarea
                                name="summary"
                                rows="4"
                                class="form-control"></textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Skills

                            </label>

                            <textarea
                                name="skills"
                                rows="3"
                                class="form-control"></textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Experience

                            </label>

                            <textarea
                                name="experience"
                                rows="4"
                                class="form-control"></textarea>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Education

                            </label>

                            <textarea
                                name="education"
                                rows="4"
                                class="form-control"></textarea>

                        </div>

                        <button
                            class="btn btn-primary btn-lg">

                            Save Resume

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
