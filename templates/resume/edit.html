{% extends "layouts/base.html" %}

{% block title %}Edit Resume | JobFinder Pro{% endblock %}

{% block content %}

<section class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-9">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-5">

                    <h2 class="fw-bold mb-4">

                        Edit Resume

                    </h2>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">

                                Resume Title

                            </label>

                            <input
                                type="text"
                                name="title"
                                class="form-control"
                                value="{{ resume.title }}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Full Name

                            </label>

                            <input
                                type="text"
                                name="full_name"
                                class="form-control"
                                value="{{ resume.full_name }}"
                                required>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Email

                                </label>

                                <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    value="{{ resume.email }}"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Phone

                                </label>

                                <input
                                    type="text"
                                    name="phone"
                                    class="form-control"
                                    value="{{ resume.phone }}">

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Professional Summary

                            </label>

                            <textarea
                                name="summary"
                                rows="4"
                                class="form-control">{{ resume.summary }}</textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Skills

                            </label>

                            <textarea
                                name="skills"
                                rows="3"
                                class="form-control">{{ resume.skills }}</textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Experience

                            </label>

                            <textarea
                                name="experience"
                                rows="4"
                                class="form-control">{{ resume.experience }}</textarea>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Education

                            </label>

                            <textarea
                                name="education"
                                rows="4"
                                class="form-control">{{ resume.education }}</textarea>

                        </div>

                        <div class="d-flex gap-2">

                            <button
                                type="submit"
                                class="btn btn-warning btn-lg">

                                <i class="bi bi-pencil-square"></i>

                                Update Resume

                            </button>

                            <a
                                href="{{ url_for('resume.preview', resume_id=resume.id) }}"
                                class="btn btn-secondary btn-lg">

                                Cancel

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
